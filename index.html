<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Controle de Gastos</title>

<script src="https://cdn.tailwindcss.com"></script>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
</head>

<body class="bg-gray-900 text-white">

<!-- MENU -->
<div id="sidebar"
class="fixed left-[-260px] top-0 w-64 h-full bg-gray-800 p-4 transition-all z-50">

<h2 class="text-xl mb-4">Menu</h2>

<div id="userBox" class="hidden mb-3 text-center">
  <p class="text-green-400 font-bold" id="userName"></p>
</div>

<button id="loginBtn" onclick="login()"
class="bg-green-600 w-full p-2 mb-2 rounded">
Login
</button>

<button onclick="logout()"
class="bg-gray-600 w-full p-2 mb-2 rounded">
Sair
</button>

<input id="salary" type="number"
class="w-full p-2 mt-4 bg-gray-700 rounded"
placeholder="Salário mensal">

</div>

<!-- BOTÃO MENU -->
<button onclick="toggleMenu()"
class="fixed top-4 left-4 bg-blue-600 px-3 py-2 rounded z-50">☰</button>

<!-- APP -->
<div class="max-w-2xl mx-auto bg-gray-800 p-6 rounded-2xl mt-16">

<h1 class="text-2xl font-bold mb-4">💰 Controle de Gastos</h1>

<div id="app" style="display:none;">

<!-- FORM -->
<div class="mb-4">
<input id="desc" placeholder="Descrição"
class="w-full p-2 mb-2 bg-gray-700 rounded">

<select id="category" class="w-full p-2 mb-2 bg-gray-700 rounded">
  <option>Conta</option>
  <option>Divida</option>
  <option>Outros</option>
  <option>Vendas</option>
  <option>Água</option>
  <option>Luz</option>
  <option>Compra</option>
</select>

<input id="value" type="number"
class="w-full p-2 mb-2 bg-gray-700 rounded"
placeholder="Valor">

<button onclick="addTransaction()"
class="bg-blue-600 w-full p-2 rounded">Adicionar</button>
</div>

<!-- RESUMO -->
<div class="grid grid-cols-2 gap-3 mb-2 text-sm">

  <div class="bg-gray-700 p-3 rounded-xl">
    Entradas: R$ <span id="income">0</span>
  </div>

  <div class="bg-gray-700 p-3 rounded-xl">
    Gastos: R$ <span id="expenses">0</span>
  </div>

  <div class="bg-gray-700 p-3 rounded-xl">
    Salário: R$ <span id="salaryView">0</span>
  </div>

  <div class="bg-red-600/30 text-red-300 p-3 rounded-xl font-bold">
    Dívida restante: R$ <span id="debtRemaining">0</span>
  </div>

</div>

<div class="mt-8 p-5 bg-gray-800 border rounded-xl text-center text-2xl font-bold">
  Saldo: R$ <span id="balance">0</span>
</div>

<ul id="list"></ul>

</div>
</div>

<script>
// 🔥 FIREBASE
const firebaseConfig = {
apiKey: "AIzaSyDeXJ_uSeaLgPKRUA1nCV7UFwEzpmiOmHc",
authDomain: "meu-controle-financeiro-a0572.firebaseapp.com",
projectId: "meu-controle-financeiro-a0572",
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

let userId = null;
let transactions = [];
let salary = 0;

// 🔘 MENU
function toggleMenu(){
const menu = document.getElementById("sidebar");
if(menu.style.left === "0px"){
menu.style.left = "-260px";
} else {
menu.style.left = "0px";
}
}

// 🔐 LOGIN (CORRIGIDO + FALLBACK)
function login(){
const provider = new firebase.auth.GoogleAuthProvider();

auth.signInWithPopup(provider)
.catch(err=>{
  console.log("Popup falhou, tentando redirect...", err);
  auth.signInWithRedirect(provider);
});
}

// 🚪 LOGOUT
function logout(){
auth.signOut();
}

// 👤 USER STATE
auth.onAuthStateChanged(user=>{
if(user){
userId = user.uid;

document.getElementById("app").style.display = "block";
document.getElementById("userBox").classList.remove("hidden");
document.getElementById("userName").innerText = user.displayName || "Usuário";
document.getElementById("loginBtn").style.display = "none";

loadData();

} else {
userId = null;

document.getElementById("app").style.display = "none";
document.getElementById("userBox").classList.add("hidden");
document.getElementById("loginBtn").style.display = "block";
}
});

// 📦 LOAD
async function loadData(){
const doc = await db.collection("users").doc(userId).get();

if(doc.exists){
const d = doc.data();
transactions = d.transactions || [];
salary = d.salary || 0;
}

document.getElementById("salary").value = salary;
updateUI();
}

// 💾 SAVE
async function saveData(){
await db.collection("users").doc(userId).set({
transactions,
salary
});
}

// 📊 UI
function updateUI(){

const list = document.getElementById("list");
list.innerHTML = "";

let total = 0;
let income = 0;
let expenses = 0;
let debtRemaining = 0;

transactions.forEach((t,i)=>{

let value = t.value;

if(t.category === "Divida" && !t.status){
t.status = "pendente";
}

let include = true;

if(t.category === "Divida"){
value = -Math.abs(value);

if(t.status === "pendente"){
debtRemaining += Math.abs(t.value);
include = false;
}
}

if(include){
total += value;
if(value > 0) income += value;
else expenses += value;
}

let statusTag = "";

if(t.category === "Divida"){
statusTag = `
<button onclick="toggleStatus(${i})"
class="ml-2 px-2 py-1 text-xs rounded
${t.status === "pendente" ? "bg-red-500" : "bg-green-500"}">
${t.status === "pendente" ? "PENDENTE" : "PAGO"}
</button>`;
}

const li = document.createElement("li");
li.className="flex justify-between bg-gray-700 p-2 mt-1 rounded";

li.innerHTML = `
<span>${t.desc} (${t.category})</span>
<div class="flex gap-2 items-center">
<span>R$ ${value.toFixed(2)}</span>
${statusTag}
<button onclick="removeTransaction(${i})" class="text-red-400">X</button>
</div>
`;

list.appendChild(li);
});

document.getElementById("income").innerText = income.toFixed(2);
document.getElementById("expenses").innerText = Math.abs(expenses).toFixed(2);
document.getElementById("balance").innerText = total.toFixed(2);
document.getElementById("salaryView").innerText = salary;
document.getElementById("debtRemaining").innerText = debtRemaining.toFixed(2);

saveData();
}

// ➕ ADD
function addTransaction(){
const desc = document.getElementById("desc").value;
const value = parseFloat(document.getElementById("value").value);
const category = document.getElementById("category").value;

if(!desc || isNaN(value)) return alert("Preencha tudo");

transactions.push({
desc,
value,
category,
status: category === "Divida" ? "pendente" : null
});

updateUI();
}

// ❌ REMOVE
function removeTransaction(i){
transactions.splice(i,1);
updateUI();
}

// 🔁 STATUS
function toggleStatus(i){
transactions[i].status =
transactions[i].status === "pendente" ? "pago" : "pendente";

updateUI();
}
</script>

</body>
</html>
