<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Controle de Gastos</title>

<script src="https://cdn.tailwindcss.com"></script>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
</head>

<body class="bg-gray-900 text-white">

<!-- OVERLAY -->
<div id="overlay" onclick="toggleMenu()"
class="fixed inset-0 bg-black bg-opacity-50 hidden z-40"></div>

<!-- MENU -->
<div id="sidebar"
class="fixed left-[-260px] top-0 w-64 h-full bg-gray-800 p-4 transition-all duration-300 z-50">

<h2 class="text-xl mb-4">Menu</h2>

<button onclick="login()" class="bg-green-600 w-full p-2 mb-2 rounded">Login</button>
<button onclick="logout()" class="bg-gray-600 w-full p-2 mb-2 rounded">Sair</button>

<input id="salary" type="number" placeholder="Salário mensal"
class="w-full p-2 mt-4 bg-gray-700 rounded">
</div>

<!-- BOTÃO MENU -->
<button onclick="toggleMenu()"
class="fixed top-4 left-4 bg-blue-600 px-3 py-2 rounded z-50">☰</button>

<!-- APP -->
<div class="max-w-2xl mx-auto bg-gray-800 p-6 rounded-2xl shadow-lg mt-16">

<h1 class="text-2xl font-bold mb-4">💰 Controle de Gastos</h1>

<div id="app" style="display:none;">

<!-- FORM -->
<div class="mb-4">
<input id="desc" placeholder="Descrição"
class="w-full p-2 mb-2 bg-gray-700 rounded">

<select id="category" class="w-full p-2 mb-2 bg-gray-700 rounded">
  <option>Conta</option>
  <option>Divida</option>
  <option>Outros</option>
  <option>Vendas</option>
  <option>Água</option>
  <option>Luz</option>
  <option>Compra</option>
</select>

<input id="value" type="number" placeholder="Valor"
class="w-full p-2 mb-2 bg-gray-700 rounded">

<button onclick="addTransaction()"
class="bg-blue-600 w-full p-2 rounded">Adicionar</button>
</div>

<!-- RESUMO -->
<div class="grid grid-cols-2 gap-4 mb-2 text-sm">
  <div>Entradas: R$ <span id="income">0</span></div>
  <div>Gastos: R$ <span id="expenses">0</span></div>
  <div>Salário: R$ <span id="salaryView">0</span></div>

  <div id="debtBox" class="text-red-400 font-bold">
    Dívida restante: R$ <span id="debtRemaining">0</span>
  </div>
</div>

<!-- SALDO DESTACADO -->
<div class="mt-4 p-4 bg-gray-700 rounded-xl text-center text-xl font-bold">
  Saldo: R$ <span id="balance">0</span>
</div>

<ul id="list"></ul>

<h2 class="mt-6 text-lg font-bold">📅 Histórico</h2>
<ul id="history"></ul>

</div>
</div>

<script>
// FIREBASE
const firebaseConfig = {
apiKey: "AIzaSyDeXJ_uSeaLgPKRUA1nCV7UFwEzpmiOmHc",
authDomain: "meu-controle-financeiro-a0572.firebaseapp.com",
projectId: "meu-controle-financeiro-a0572",
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

let userId = null;
let transactions = [];
let history = [];
let salary = 0;
let lastReset = null;

// MENU
function toggleMenu(){
const menu = document.getElementById("sidebar");
const overlay = document.getElementById("overlay");

if(menu.style.left === "0px"){
menu.style.left = "-260px";
overlay.classList.add("hidden");
} else {
menu.style.left = "0px";
overlay.classList.remove("hidden");
}
}

// LOGIN
function login(){
const provider = new firebase.auth.GoogleAuthProvider();
auth.signInWithPopup(provider);
}

function logout(){
auth.signOut();
}

auth.onAuthStateChanged(user=>{
if(user){
userId = user.uid;
document.getElementById("app").style.display = "block";
loadData();
}
});

// LOAD
async function loadData(){
const doc = await db.collection("users").doc(userId).get();
if(doc.exists){
const d = doc.data();
transactions = d.transactions || [];
history = d.history || [];
salary = d.salary || 0;
lastReset = d.lastReset || null;
}

document.getElementById("salary").value = salary;
updateUI();
}

// SAVE
async function saveData(){
await db.collection("users").doc(userId).set({
transactions,
history,
salary,
lastReset
});
}

// UI
function updateUI(){

const list = document.getElementById("list");

list.innerHTML = "";

let total = 0;
let income = 0;
let expenses = 0;
let debtRemaining = 0;

transactions.forEach((t,i)=>{

  let value = t.value;

  // 🔴 DÍVIDA vira negativa automaticamente
  if(t.category === "Divida"){
    value = -Math.abs(value);

    // só soma dívida pendente
    if(t.status === "pendente"){
      debtRemaining += Math.abs(t.value);
    }
  }

  total += value;

  if(value > 0) income += value;
  else expenses += value;

  const li = document.createElement("li");
  li.className="flex justify-between items-center bg-gray-700 p-2 mt-1 rounded";

  li.innerHTML = `
    <span>${t.desc} (${t.category})</span>
    <span>R$ ${value.toFixed(2)}</span>
    <button onclick="removeTransaction(${i})" class="text-red-400 ml-2">X</button>
  `;

  list.appendChild(li);
});

// RESUMO
document.getElementById("income").innerText = income.toFixed(2);
document.getElementById("expenses").innerText = Math.abs(expenses).toFixed(2);
document.getElementById("balance").innerText = total.toFixed(2);
document.getElementById("salaryView").innerText = salary;
document.getElementById("debtRemaining").innerText = debtRemaining.toFixed(2);

saveData();
}

// ADD
function addTransaction(){
const desc = document.getElementById("desc").value;
const value = parseFloat(document.getElementById("value").value);
const category = document.getElementById("category").value;

if(!desc || isNaN(value)) return alert("Preencha tudo");

transactions.push({
desc,
value,
category,
date: new Date()
});

document.getElementById("desc").value = "";
document.getElementById("value").value = "";

updateUI();
}

// REMOVE
function removeTransaction(i){
transactions.splice(i,1);
updateUI();
}
</script>

</body>
</html>
